name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    name: Publicar Windows
    runs-on: windows-latest
    env:
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Validar tag
        run: node scripts/assert-tag-version.mjs ${{ github.ref_name }}

      - name: Publicar Windows
        run: npm run publish:win

  macos:
    name: Publicar macOS
    runs-on: macos-latest
    env:
      GH_OWNER: ${{ github.repository_owner }}
      GH_REPO: ${{ github.event.repository.name }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
    steps:
      - name: Verificar segredos do macOS
        id: verify_macos_secrets
        shell: bash
        run: |
          missing=0
          for var in CSC_LINK CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!var}" ]; then
              echo "Segredo ausente: $var"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "Publicação macOS será ignorada por falta de segredos."
          else
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: ${{ steps.verify_macos_secrets.outputs.should_publish == 'true' }}
        uses: actions/checkout@v4

      - name: Node.js
        if: ${{ steps.verify_macos_secrets.outputs.should_publish == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências
        if: ${{ steps.verify_macos_secrets.outputs.should_publish == 'true' }}
        run: npm ci

      - name: Validar tag
        if: ${{ steps.verify_macos_secrets.outputs.should_publish == 'true' }}
        run: node scripts/assert-tag-version.mjs ${{ github.ref_name }}

      - name: Publicar macOS
        if: ${{ steps.verify_macos_secrets.outputs.should_publish == 'true' }}
        run: npm run publish:mac
